<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格競輪予測 Pro</title>
    <style>
        :root {
            --color-1: #ffffff; --color-2: #333333; --color-3: #e74c3c;
            --color-4: #3498db; --color-5: #f1c40f; --color-6: #27ae60;
            --color-7: #e67e22; --color-8: #95a5a6; --color-9: #8e44ad;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a1a1a; font-size: 1.4rem; margin-bottom: 20px; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        
        .setup-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        label { font-size: 0.85rem; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        select, input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }

        .player-row { display: flex; align-items: center; margin-bottom: 8px; gap: 10px; padding: 5px; border-radius: 8px; transition: 0.2s; }
        .car-number { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ccc; font-size: 0.9rem; }
        
        /* 車番カラー設定 */
        .car-1 { background-color: var(--color-1); color: #000; }
        .car-2 { background-color: var(--color-2); color: #fff; }
        .car-3 { background-color: var(--color-3); color: #fff; }
        .car-4 { background-color: var(--color-4); color: #fff; }
        .car-5 { background-color: var(--color-5); color: #000; }
        .car-6 { background-color: var(--color-6); color: #fff; }
        .car-7 { background-color: var(--color-7); color: #fff; }
        .car-8 { background-color: var(--color-8); color: #fff; }
        .car-9 { background-color: var(--color-9); color: #fff; }

        button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #1e8449; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e8449; }

        #result { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; background-color: #fffbe6; border: 2px solid #ffe58f; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; }
        .rank-badge { background: #e67e22; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 10px; }
        .score-val { font-weight: bold; font-size: 1.1rem; color: #d35400; }
    </style>
</head>
<body>

<div class="container">
    <h1>本格競輪予測 Pro</h1>
    
    <div class="setup-section">
        <div>
            <label>競輪場（バンク）</label>
            <select id="stadium">
                <option value="1.0">基準 (400m)</option>
                <option value="1.05">直線長 (松山等)</option>
                <option value="0.95">短周 (小倉・前橋等)</option>
            </select>
        </div>
        <div>
            <label>レース番号</label>
            <input type="number" id="race-num" value="1" min="1" max="12">
        </div>
    </div>

    <div id="player-inputs">
        <script>
            const container = document.getElementById('player-inputs');
            for(let i=1; i<=9; i++) {
                container.innerHTML += `
                    <div class="player-row">
                        <div class="car-number car-${i}">${i}</div>
                        <input type="number" id="score${i}" placeholder="競走得点" step="0.1" value="${(90 - i).toFixed(1)}">
                    </div>
                `;
            }
        </script>
    </div>

    <button onclick="runPrediction()">予想実行</button>

    <div id="result">
        <h3 style="margin-top:0;">💡 予測結果（期待値順）</h3>
        <div id="prediction-list"></div>
    </div>
</div>

<script>
    function runPrediction() {
        const stadiumMod = parseFloat(document.getElementById('stadium').value);
        let results = [];

        for(let i=1; i<=9; i++) {
            const rawScore = parseFloat(document.getElementById(`score${i}`).value) || 0;
            if(rawScore > 0) {
                // 仮の本格ロジック：得点にバンク補正を掛け合わせる
                const finalScore = (rawScore * stadiumMod).toFixed(2);
                results.push({ car: i, score: parseFloat(finalScore) });
            }
        }

        // スコアの高い順にソート
        results.sort((a, b) => b.score - a.score);

        const list = document.getElementById('prediction-list');
        list.innerHTML = '';
        
        results.forEach((res, index) => {
            const rankLabel = index === 0 ? '◎' : index === 1 ? '○' : index === 2 ? '▲' : '△';
            list.innerHTML += `
                <div class="rank-item">
                    <span><span class="rank-badge">${rankLabel}</span> ${res.car}番車</span>
                    <span class="score-val">${res.score}</span>
                </div>
            `;
        });

        document.getElementById('result').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
