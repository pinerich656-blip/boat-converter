<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格競輪予測 Pro - 診断モード</title>
    <style>
        :root { --color-1: #ffffff; --color-2: #333333; --color-3: #e74c3c; --color-4: #3498db; --color-5: #f1c40f; --color-6: #27ae60; --color-7: #e67e22; --color-8: #95a5a6; --color-9: #8e44ad; }
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a1a1a; font-size: 1.2rem; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        .status-badge { background: #eef7f2; color: #27ae60; padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; text-align: center; margin-bottom: 15px; }
        .setup-section { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-fetch { background: #3498db; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 5px; cursor: pointer; }
        .btn-debug { background: #95a5a6; color: white; border: none; width: 100%; padding: 8px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 15px; cursor: pointer; }
        .player-row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
        .car-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ccc; font-size: 0.8rem; }
        .car-1 { background: var(--color-1); color: #000; } .car-2 { background: var(--color-2); color: #fff; } .car-3 { background: var(--color-3); color: #fff; } .car-4 { background: var(--color-4); color: #fff; } .car-5 { background: var(--color-5); color: #000; } .car-6 { background: var(--color-6); color: #fff; } .car-7 { background: var(--color-7); color: #fff; } .car-8 { background: var(--color-8); color: #fff; } .car-9 { background: var(--color-9); color: #fff; }
        .btn-calc { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; background: #fffbe6; border: 2px solid #ffe58f; }
    </style>
</head>
<body>

<div class="container">
    <h1>本格競輪予測 Pro</h1>
    <div id="status" class="status-badge">未同期</div>

    <button class="btn-fetch" onclick="autoFetchData()">🔄 データを同期</button>
    <button class="btn-debug" onclick="showRawData()">📄 生データを確認</button>

    <div class="setup-section">
        <div>
            <label style="font-size:0.8rem">開催場</label>
            <select id="stadium-select" onchange="updateRaceDisplay()"></select>
        </div>
        <div>
            <label style="font-size:0.8rem">レース番号</label>
            <input type="number" id="race-num" value="1" min="1" max="12" onchange="updateRaceDisplay()">
        </div>
    </div>

    <div id="players"></div>
    <button class="btn-calc" onclick="runCalculation()">予想実行</button>
    <div id="result"><div id="prediction-list"></div></div>
</div>

<script>
    let allData = null;

    // 初期化
    const pArea = document.getElementById('players');
    for(let i=1; i<=9; i++) {
        pArea.innerHTML += `
            <div class="player-row">
                <div class="car-num car-${i}">${i}</div>
                <input type="number" id="score${i}" placeholder="得点" step="0.1" style="width:70px;">
                <input type="text" id="name${i}" placeholder="選手名" readonly style="background:#f9f9f9; flex:1;">
            </div>
        `;
    }

    async function autoFetchData() {
        try {
            // URLにランダムな数字を付けて、Safariに「新しいファイルだ！」と思わせる
            const res = await fetch('data.json?nocache=' + Math.random());
            allData = await res.json();
            
            const select = document.getElementById('stadium-select');
            select.innerHTML = '';
            const stadiums = Object.keys(allData);
            
            if(stadiums.length === 0) {
                alert("データが空っぽだよ！Pythonが失敗してるかも。");
                return;
            }

            stadiums.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.innerHTML = s;
                select.appendChild(opt);
            });
            
            document.getElementById('status').innerText = "✅ 同期成功 (" + stadiums.join(", ") + ")";
            updateRaceDisplay();
        } catch (e) {
            alert("同期エラー: data.jsonが見つからないか、中身が壊れてるよ。");
        }
    }

    function showRawData() {
        if(!allData) { alert("まだ同期してないよ"); return; }
        alert("現在のデータ:\n" + JSON.stringify(allData).substring(0, 200) + "...");
    }

    function updateRaceDisplay() {
        if (!allData) return;
        const stadium = document.getElementById('stadium-select').value;
        const raceNum = document.getElementById('race-num').value;
        const players = allData[stadium]?.[raceNum];
        
        if (players) {
            players.forEach(p => {
                document.getElementById(`score${p.id}`).value = p.s;
                document.getElementById(`name${p.id}`).value = p.n;
            });
        }
    }

    function runCalculation() { /* 計算ロジック(省略) */ alert("予想完了！結果を見てね"); document.getElementById('result').style.display='block'; }
</script>
</body>
</html>
