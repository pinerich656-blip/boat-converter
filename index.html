<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOAT RACE 1マーク展開AI</title>
<style>
:root{
  --bg:#0b1220;
  --card:#121c33;
  --line:#22304d;
  --text:#ffffff;
  --muted:#9fb0d1;
  --blue:#2563eb;
  --cyan:#06b6d4;
  --green:#16a34a;
  --red:#dc2626;
  --gold:#f59e0b;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#08111f,#0d1730);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.app{max-width:430px;margin:auto;padding:12px}
.card{
  background:var(--card);
  padding:14px;
  margin:10px 0;
  border-radius:16px;
  border:1px solid var(--line);
}
h3{margin:0}
button{
  width:100%;
  padding:14px;
  margin-top:6px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  color:#fff;
  font-size:16px;
  font-weight:800;
}
.result{line-height:1.8}
.badge{
  display:inline-block;
  padding:7px 12px;
  border-radius:999px;
  margin:4px 4px 0 0;
  font-weight:800;
  font-size:13px;
}
.good{background:var(--green)}
.warn{background:var(--red)}
.tip{background:var(--blue)}

.head-grid,
.row-grid{
  display:grid;
  grid-template-columns:42px repeat(4,1fr);
  gap:8px;
  align-items:center;
  margin-top:8px;
}

.head-cell{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  font-weight:700;
}

.cap{
  display:flex;
  justify-content:center;
  align-items:center;
  height:48px;
  border-radius:10px;
  font-weight:900;
  font-size:18px;
}
.c1{background:#fff;color:#000}
.c2{background:#000;color:#fff}
.c3{background:#ef4444;color:#fff}
.c4{background:#2563eb;color:#fff}
.c5{background:#f59e0b;color:#000}
.c6{background:#16a34a;color:#fff}

.num-wrap{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.num-input{
  width:100%;
  height:48px;
  border:none;
  border-radius:10px;
  background:#08101d;
  color:#fff;
  text-align:center;
  font-size:18px;
  font-weight:800;
  outline:none;
  border:1px solid #243352;
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:textfield;
  caret-color:transparent;
}
.num-input.active{
  border:2px solid var(--cyan);
  box-shadow:0 0 0 2px rgba(6,182,212,.15);
}
.num-label{
  text-align:center;
  font-size:11px;
  color:var(--muted);
}
.palette-help{
  margin-top:8px;
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}
.comment{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#0d1628;
  border:1px solid #22304d;
}
.active-info{
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  background:#0d1628;
  font-size:13px;
  color:#dbeafe;
}
.pad-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}
.pad-btn{
  height:54px;
  border:none;
  border-radius:12px;
  font-size:22px;
  font-weight:900;
  color:#fff;
  background:#0b1324;
  border:1px solid #294066;
}
.pad-btn:active{transform:scale(.98)}
.pad-btn.func{background:#1d4ed8}
.pad-btn.warn{background:#b91c1c}
.pad-btn.zero{grid-column:span 2}
.clear-btn{
  background:#374151;
}
.top-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.small-btn{
  height:44px;
  font-size:14px;
  font-weight:800;
}
</style>
</head>
<body>
<div class="app">

  <div class="card">
    <h3>1マーク展開AI</h3>
    <div class="palette-help">
      入力欄をタップしてから、下の数字パレットで入力します。<br>
      ST・展示は小数、M2・勝率も小数入力OKです。
    </div>
  </div>

  <div class="card">
    <div class="top-actions">
      <button class="small-btn clear-btn" onclick="clearInputs()">全入力クリア</button>
      <button class="small-btn" onclick="runAI()">展開予測</button>
    </div>
  </div>

  <div class="card">
    <div class="head-grid">
      <div class="head-cell">艇</div>
      <div class="head-cell">ST</div>
      <div class="head-cell">展示</div>
      <div class="head-cell">M2</div>
      <div class="head-cell">勝率</div>
    </div>
    <div id="inputs"></div>
  </div>

  <div class="card">
    <div class="section-title"><b>数字パレット</b></div>
    <div id="activeInfo" class="active-info">入力欄を選んでください</div>

    <div class="pad-grid">
      <button class="pad-btn" onclick="pressKey('1')">1</button>
      <button class="pad-btn" onclick="pressKey('2')">2</button>
      <button class="pad-btn" onclick="pressKey('3')">3</button>
      <button class="pad-btn" onclick="pressKey('4')">4</button>
      <button class="pad-btn" onclick="pressKey('5')">5</button>
      <button class="pad-btn" onclick="pressKey('6')">6</button>
      <button class="pad-btn" onclick="pressKey('7')">7</button>
      <button class="pad-btn" onclick="pressKey('8')">8</button>
      <button class="pad-btn" onclick="pressKey('9')">9</button>
      <button class="pad-btn func" onclick="pressKey('.')">.</button>
      <button class="pad-btn zero" onclick="pressKey('0')">0</button>
      <button class="pad-btn func" onclick="backspaceKey()">⌫</button>
      <button class="pad-btn warn" onclick="clearActive()">C</button>
      <button class="pad-btn func" onclick="movePrev()">←</button>
      <button class="pad-btn func" onclick="moveNext()">→</button>
    </div>
  </div>

  <div class="card result" id="result">結果待ち</div>

</div>

<script>
let activeInputId = "";

function makeInputs(){
  let html = "";
  for(let i=1;i<=6;i++){
    html += `
      <div class="row-grid">
        <div class="cap c${i}">${i}</div>

        <div class="num-wrap">
          <input id="st${i}" class="num-input" type="text" placeholder="0.13" readonly onclick="setActive('st${i}','${i}号艇 ST')">
          <div class="num-label">ST</div>
        </div>

        <div class="num-wrap">
          <input id="tenji${i}" class="num-input" type="text" placeholder="6.75" readonly onclick="setActive('tenji${i}','${i}号艇 展示')">
          <div class="num-label">展示</div>
        </div>

        <div class="num-wrap">
          <input id="m2${i}" class="num-input" type="text" placeholder="35.2" readonly onclick="setActive('m2${i}','${i}号艇 M2')">
          <div class="num-label">M2</div>
        </div>

        <div class="num-wrap">
          <input id="rate${i}" class="num-input" type="text" placeholder="6.45" readonly onclick="setActive('rate${i}','${i}号艇 勝率')">
          <div class="num-label">勝率</div>
        </div>
      </div>
    `;
  }
  document.getElementById("inputs").innerHTML = html;
}

function allInputIds(){
  const ids = [];
  for(let i=1;i<=6;i++){
    ids.push(`st${i}`, `tenji${i}`, `m2${i}`, `rate${i}`);
  }
  return ids;
}

function labelOf(id){
  if(!id) return "";
  const m = id.match(/(st|tenji|m2|rate)(\d)/);
  if(!m) return id;
  const key = m[1];
  const boat = m[2];
  const map = {
    st:"ST",
    tenji:"展示",
    m2:"M2",
    rate:"勝率"
  };
  return `${boat}号艇 ${map[key]}`;
}

function setActive(id, labelText){
  activeInputId = id;
  document.querySelectorAll(".num-input").forEach(el => el.classList.remove("active"));
  const el = document.getElementById(id);
  if(el){
    el.classList.add("active");
  }
  document.getElementById("activeInfo").textContent = `入力中：${labelText}`;
}

function pressKey(key){
  if(!activeInputId) return;
  const el = document.getElementById(activeInputId);
  if(!el) return;

  let v = el.value || "";

  if(key === "."){
    if(v.includes(".")) return;
    if(v === "") v = "0";
    el.value = v + ".";
    return;
  }

  el.value = v + key;
}

function backspaceKey(){
  if(!activeInputId) return;
  const el = document.getElementById(activeInputId);
  if(!el) return;
  el.value = (el.value || "").slice(0, -1);
}

function clearActive(){
  if(!activeInputId) return;
  const el = document.getElementById(activeInputId);
  if(!el) return;
  el.value = "";
}

function movePrev(){
  const ids = allInputIds();
  if(!activeInputId){
    setActive(ids[0], labelOf(ids[0]));
    return;
  }
  const idx = ids.indexOf(activeInputId);
  const nextIdx = idx <= 0 ? 0 : idx - 1;
  setActive(ids[nextIdx], labelOf(ids[nextIdx]));
}

function moveNext(){
  const ids = allInputIds();
  if(!activeInputId){
    setActive(ids[0], labelOf(ids[0]));
    return;
  }
  const idx = ids.indexOf(activeInputId);
  const nextIdx = idx >= ids.length - 1 ? ids.length - 1 : idx + 1;
  setActive(ids[nextIdx], labelOf(ids[nextIdx]));
}

function clearInputs(){
  allInputIds().forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = "";
  });
  document.querySelectorAll(".num-input").forEach(el => el.classList.remove("active"));
  activeInputId = "";
  document.getElementById("activeInfo").textContent = "入力欄を選んでください";
  document.getElementById("result").innerHTML = "結果待ち";
}

function num(id){
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) ? 0 : v;
}

function stPower(st){
  return st > 0 ? (0.20 - st) * 120 : 0;
}

function tenjiPower(t){
  return t > 0 ? (7 - t) * 18 : 0;
}

function runAI(){
  const boats = [];

  for(let i=1;i<=6;i++){
    boats.push({
      boat:i,
      st:num("st"+i),
      tenji:num("tenji"+i),
      m2:num("m2"+i),
      rate:num("rate"+i)
    });
  }

  const one   = boats[0];
  const two   = boats[1];
  const three = boats[2];
  const four  = boats[3];

  const inEscape =
    one.rate * 8 +
    one.m2 * 0.5 +
    stPower(one.st) +
    tenjiPower(one.tenji);

  const sashi =
    two.rate * 6 +
    two.m2 * 0.4 +
    stPower(two.st) +
    tenjiPower(two.tenji);

  const makuri3 =
    three.rate * 5 +
    three.m2 * 0.4 +
    stPower(three.st) +
    tenjiPower(three.tenji);

  const makuri4 =
    four.rate * 6 +
    four.m2 * 0.5 +
    stPower(four.st) +
    tenjiPower(four.tenji);

  const makuri = Math.max(makuri3, makuri4);

  let scenario = "イン逃げ";
  let attacker = 1;

  if(inEscape < sashi && sashi > makuri){
    scenario = "差し";
    attacker = 2;
  } else if(makuri > inEscape){
    scenario = "まくり / まくり差し";
    attacker = (makuri4 > makuri3) ? 4 : 3;
  }

  const risk = Math.max(0, sashi + makuri - inEscape);

  let riskText = "低";
  let riskClass = "good";
  if(risk > 50){
    riskText = "高";
    riskClass = "warn";
  } else if(risk > 25){
    riskText = "中";
    riskClass = "tip";
  }

  let order = "1-2-3";
  if(scenario === "差し") order = "2-1-3";
  if(scenario.indexOf("まくり") >= 0) order = attacker + "-1-2";

  let comment = "";
  if(scenario === "イン逃げ"){
    comment = "①が先マイして押し切る展開。";
  } else if(scenario === "差し"){
    comment = "②が差して①を捕らえる展開。";
  } else {
    comment = attacker + "が外から攻めて1マークの形を崩す展開。";
  }

  document.getElementById("result").innerHTML = `
    <div class="badge tip">展開タイプ：${scenario}</div>
    <div class="badge good">攻め艇：${attacker}号艇</div>
    <div class="badge ${riskClass}">危険度：${riskText}</div>
    <div class="comment">
      <b>1マーク通過予想：</b> ${order}<br>
      <b>コメント：</b> ${comment}
    </div>
  `;
}

makeInputs();
</script>
</body>
</html>
